services:
  postgres:
    image: postgres:17-alpine
    container_name: nextjs-dashboard-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: node:20-bookworm-slim
    container_name: nextjs-dashboard-dev
    working_dir: /app
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      RUNNING_IN_DOCKER: "true"
      PRISMA_DATABASE_URL: ${PRISMA_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dashboard}}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dashboard}}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dashboard}}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      PNPM_HOME: /root/.local/share/pnpm
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    command: >
      sh -lc "
      apt-get update -qq &&
      apt-get install -y --no-install-recommends openssl ca-certificates &&
      rm -rf /var/lib/apt/lists/* &&
      npm install -g pnpm@9.15.4 &&
      pnpm config set store-dir /root/.local/share/pnpm/store &&
      pnpm install &&
      pnpm exec prisma generate &&
      pnpm dev --hostname 0.0.0.0 --port 3000
      "
    tty: true
    stdin_open: true

volumes:
  app_node_modules:
  pnpm_store:
  postgres_data:
