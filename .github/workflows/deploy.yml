name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:migrator-latest
            ${{ env.IMAGE_NAME }}:migrator-${{ github.sha }}

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "$HOME/apps/p"
            cd "$HOME/apps/p"

            printf '%s\n' 'services:' '  postgres:' '    image: "postgres:17-alpine"' '    container_name: nextjs-dashboard-postgres-prod' '    environment:' '      POSTGRES_USER: "${POSTGRES_USER:-postgres}"' '      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"' '      POSTGRES_DB: "${POSTGRES_DB:-dashboard}"' '    volumes:' '      - "postgres_data:/var/lib/postgresql/data"' '    healthcheck:' '      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]' '      interval: 10s' '      timeout: 5s' '      retries: 10' '    restart: unless-stopped' '  app:' '    image: "${IMAGE_TAG:-bunrithbuth/pp:latest}"' '    container_name: nextjs-dashboard-prod' '    ports:' '      - "80:3000"' '    depends_on:' '      postgres:' '        condition: service_healthy' '    environment:' '      NODE_ENV: production' '      PORT: 3000' '      HOSTNAME: 0.0.0.0' '      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dashboard}?schema=public"' '      POSTGRES_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-dashboard}?schema=public"' '      AUTH_SECRET: "${AUTH_SECRET:-}"' '      AUTH_URL: "${AUTH_URL:-}"' '    restart: unless-stopped' 'volumes:' '  postgres_data:' > docker-compose.ec2.yml

            printf '%s\n' "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" "AUTH_URL=${{ secrets.AUTH_URL }}" > .env

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose version
            docker compose --env-file .env -f docker-compose.ec2.yml config > /tmp/compose.rendered.yml
            docker compose --env-file .env -f docker-compose.ec2.yml pull
            docker compose --env-file .env -f docker-compose.ec2.yml up -d --remove-orphans
            docker run --rm \
              --network p_default \
              --env-file .env \
              -e DATABASE_URL="postgresql://$(grep POSTGRES_USER .env | cut -d= -f2):$(grep POSTGRES_PASSWORD .env | cut -d= -f2)@nextjs-dashboard-postgres-prod:5432/$(grep POSTGRES_DB .env | cut -d= -f2)?schema=public" \
              -e PRISMA_DATABASE_URL="postgresql://$(grep POSTGRES_USER .env | cut -d= -f2):$(grep POSTGRES_PASSWORD .env | cut -d= -f2)@nextjs-dashboard-postgres-prod:5432/$(grep POSTGRES_DB .env | cut -d= -f2)?schema=public" \
              ${{ env.IMAGE_NAME }}:migrator-${{ github.sha }}
            docker image prune -f

