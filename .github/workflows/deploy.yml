name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  prisma-migrate:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/dashboard?schema=public
      PRISMA_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/dashboard?schema=public
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/dashboard?schema=public
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d dashboard"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Prisma migrations
        run: pnpm prisma:migrate:deploy

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: [build-and-push, prisma-migrate]
    environment: production
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "$HOME/apps/p"
            cd "$HOME/apps/p"

            printf '%s\n' 'services:' '  app:' '    image: "${IMAGE_TAG:-bunrithbuth/pp:latest}"' '    container_name: nextjs-dashboard-prod' '    ports:' '      - "80:3000"' '    environment:' '      NODE_ENV: production' '      PORT: 3000' '      HOSTNAME: 0.0.0.0' '      DATABASE_URL: "${DATABASE_URL:-}"' '      POSTGRES_URL: "${POSTGRES_URL:-}"' '      AUTH_SECRET: "${AUTH_SECRET:-}"' '      AUTH_URL: "${AUTH_URL:-}"' '    restart: unless-stopped' > docker-compose.ec2.yml

            printf '%s\n' "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" "DATABASE_URL=${{ secrets.DATABASE_URL }}" "POSTGRES_URL=${{ secrets.POSTGRES_URL }}" "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" "AUTH_URL=${{ secrets.AUTH_URL }}" > .env

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose version
            docker compose --env-file .env -f docker-compose.ec2.yml config > /tmp/compose.rendered.yml
            docker compose --env-file .env -f docker-compose.ec2.yml pull
            docker compose --env-file .env -f docker-compose.ec2.yml up -d --remove-orphans
            docker image prune -f

