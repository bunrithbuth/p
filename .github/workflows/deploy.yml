name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            mkdir -p "$HOME/apps/p"
            cd "$HOME/apps/p"

            cat > docker-compose.ec2.yml << 'EOF'
            services:
              app:
                image: ${IMAGE_TAG:-bunrithbuth/pp:latest}
                container_name: nextjs-dashboard-prod
                ports:
                  - "3000:3000"
                environment:
                  NODE_ENV: production
                  PORT: 3000
                  HOSTNAME: 0.0.0.0
                  POSTGRES_URL: ${POSTGRES_URL:-}
                  AUTH_SECRET: ${AUTH_SECRET:-}
                  AUTH_URL: ${AUTH_URL:-}
                restart: unless-stopped
            EOF

            cat > .env << EOF
            IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose --env-file .env -f docker-compose.ec2.yml pull
            docker compose --env-file .env -f docker-compose.ec2.yml up -d --remove-orphans
            docker image prune -f

