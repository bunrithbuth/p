name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:migrator-latest
            ${{ env.IMAGE_NAME }}:migrator-${{ github.sha }}

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy directory on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "$HOME/apps/p"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.ec2.yml
          target: ~/apps/p

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "$HOME/apps/p"

            printf '%s\n' \
            "IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" \
            "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
            "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" \
            "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
            "AUTH_URL=${{ secrets.AUTH_URL }}" \
            "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@nextjs-dashboard-postgres-prod:5432/${{ secrets.POSTGRES_DB }}?schema=public" \
            "PRISMA_DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@nextjs-dashboard-postgres-prod:5432/${{ secrets.POSTGRES_DB }}?schema=public" \
            > .env
            
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose version

            # Free Docker disk before pulling new images (keep DB volume intact).
            echo "Disk usage before cleanup"
            df -h
            docker system df || true
            docker image prune -af || true
            docker builder prune -af || true
            docker container prune -f

            ROOT_USED_PCT=$(df -P / | awk 'NR==2 {gsub("%","",$5); print $5}')
            if [ "${ROOT_USED_PCT:-0}" -ge 90 ]; then
              echo "Root FS usage ${ROOT_USED_PCT}% >= 90, running stronger Docker prune (no volumes)."
              docker system prune -af || true
            fi

            echo "Disk usage after cleanup"
            df -h
            docker system df || true

            docker compose --env-file .env -f docker-compose.ec2.yml config > /tmp/compose.rendered.yml
            if ! docker compose --env-file .env -f docker-compose.ec2.yml pull; then
              echo "Compose pull failed once; retrying after additional prune."
              docker system prune -af || true
              docker compose --env-file .env -f docker-compose.ec2.yml pull
            fi
            docker compose --env-file .env -f docker-compose.ec2.yml up -d --remove-orphans
            docker run --rm \
              --network p_default \
              --env-file .env \
              ${{ env.IMAGE_NAME }}:migrator-${{ github.sha }}
            docker image prune -f
